<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Face BLE Multi-Control (Sensitive)</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f9; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 8px; transition: 0.3s; }
        button:disabled { background: #6c757d; }
        #status { margin-top: 10px; color: #555; font-weight: bold; }
        
        #output_canvas { 
            border-radius: 10px; 
            border: 4px solid #fff; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transform: scaleX(-1); /* ミラー反転 */
        }
    </style>
</head>
<body>

    <div class="panel">
        <button id="connectBtn">BLE接続して開始</button>
        <div id="status">ステータス: 未接続</div>
    </div>

    <div style="position: relative;">
        <video id="input_video" style="display:none;"></video>
        <canvas id="output_canvas" width="640px" height="480px"></canvas>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        let characteristic = null;
        let isSending = false;
        const statusDiv = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');

        // BLE接続
        connectBtn.addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32-AI-Pose' }], 
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                statusDiv.innerText = "接続中：カメラ起動中...";
                connectBtn.disabled = true;
                startCamera();
            } catch (err) {
                statusDiv.innerText = "エラー: " + err;
            }
        });

        async function sendState(lStatus, rStatus) {
            if (!characteristic || isSending) return;
            isSending = true; 
            try {
                const msg = `L:${lStatus ? 1 : 0},R:${rStatus ? 1 : 0}\n`;
                const encoder = new TextEncoder();
                await characteristic.writeValue(encoder.encode(msg));
            } catch (e) { console.warn("送信失敗", e); }
            isSending = false;
        }

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        let lastL = false, lastR = false;
        let lastProcessTime = 0;

        function drawGlow(ctx, x, y, radius, color) {
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        faceMesh.onResults((results) => {
            const canvasElement = document.getElementById('output_canvas');
            const canvasCtx = canvasElement.getContext('2d');
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, 640, 480);
            canvasCtx.drawImage(results.image, 0, 0, 640, 480);

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];

                // 顔の大きさを取得
                const faceHeight = Math.hypot(landmarks[10].x - landmarks[152].x, landmarks[10].y - landmarks[152].y);

                // --- 口開け判定 (L) ---
                const mouthDist = Math.hypot(landmarks[13].x - landmarks[14].x, landmarks[13].y - landmarks[14].y);
                // しきい値を 0.08 から 0.05 に変更（より敏感に）
                const isMouthOpen = mouthDist > (faceHeight * 0.05); 

                // --- 眉上げ判定 (R) ---
                const browDist = Math.hypot(landmarks[52].x - landmarks[159].x, landmarks[52].y - landmarks[159].y);
                const isBrowUp = browDist > (faceHeight * 0.12);

                // 視覚効果
                if (isMouthOpen) {
                    const mouthX = (landmarks[13].x + landmarks[14].x) / 2 * 640;
                    const mouthY = (landmarks[13].y + landmarks[14].y) / 2 * 480;
                    drawGlow(canvasCtx, mouthX, mouthY, 50, 'rgba(255, 0, 0, 0.6)');
                }
                if (isBrowUp) {
                    const lBrowX = landmarks[52].x * 640;
                    const lBrowY = landmarks[52].y * 480;
                    const rBrowX = landmarks[282].x * 640;
                    const rBrowY = landmarks[282].y * 480;
                    drawGlow(canvasCtx, lBrowX, lBrowY, 40, 'rgba(0, 255, 0, 0.6)');
                    drawGlow(canvasCtx, rBrowX, rBrowY, 40, 'rgba(0, 255, 0, 0.6)');
                }

                // 送信間隔の制御 (0.2秒)
                const currentTime = Date.now();
                if ((isMouthOpen !== lastL || isBrowUp !== lastR) && (currentTime - lastProcessTime > 200)) {
                    lastL = isMouthOpen;
                    lastR = isBrowUp;
                    lastProcessTime = currentTime;
                    sendState(isMouthOpen, isBrowUp);
                }

                statusDiv.innerText = `接続中 (口開け:${isMouthOpen?'ON':'OFF'} 眉上げ:${isBrowUp?'ON':'OFF'})`;
            }
            canvasCtx.restore();
        });

        function startCamera() {
            const camera = new Camera(document.getElementById('input_video'), {
                onFrame: async () => { await faceMesh.send({image: document.getElementById('input_video')}); },
                width: 640, height: 480
            });
            camera.start();
        }
    </script>
</body>
</html>
